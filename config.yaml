google:
  api_key: "${GEMINI_API_KEY}"
  embedding_model: "models/text-embedding-004" # This model uses 768 dims
  chat_model: "gemini-3.1-flash"

pinecone:
  api_key: "export PINECONE_API_KEY="{pcsk_66p3nV_DsKrE4Kx7we6oC6P6jgiYb6djJFJSDzAVtfhyCWsPUWweXA3FrWNBZbDenzeyb2}"
  index_name: "f2-therapy-index"
  dimension: 768  # Crucial: Must be 768 for Gemini
  metric: "cosine"

  rag:
  chunk_size: 1000      # How many characters per chunk
  chunk_overlap: 100   # Overlap so sentences don't break
  top_k: 3             # How many chunks to pull from Pinecone