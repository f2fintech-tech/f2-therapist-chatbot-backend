google:
  api_key: "${GEMINI_API_KEY}"
  embedding_model: "text-embedding-004" # This model uses 768 dims
  chat_model: "gemini-3-flash-preview"

pinecone:
  api_key: "${PINECONE_API_KEY}"
  index_name: "f2-therapy-index"
  dimension: 3072  # Crucial: Must be 3072 for gemini-embedding-2
  metric: "cosine"$

  rag:
  chunk_size: 1000      # How many characters per chunk
  chunk_overlap: 100   # Overlap so sentences don't break
  top_k: 3             # How many chunks to pull from Pinecone