google:
  api_key: "${GEMINI_API_KEY}"
  embedding_model: "models/text-embedding-004" # This model uses 768 dims
  chat_model: "gemini-3.1-pro"

anthropic:
  # Do NOT put your real key here if you use GitHub; use environment variables
  api_key: "${ANTHROPIC_API_KEY}"
  model: "claude-3-5-sonnet-20241022"
  max_tokens: 1024
  temperature: 0.7

vector_db:
  provider: "pinecone"  # Using Pinecone for embeddings
  api_key: "${PINECONE_API_KEY}"
  index_name: "financial-therapy-index"
  dimension: 3072  # For text-embedding-3-large
  metric: "cosine"
  cloud: "aws"
  region: "us-east-1"

preprocessing:
  chunk_size: 1000
  chunk_overlap: 100
  data_path: "data/raw/"

api:
  host: "0.0.0.0"
  port: 8000
  environment: "development"
  log_level: "info"

database:
  # Do NOT put credentials here; use DATABASE_URL environment variable
  echo: false  # Set to true for SQL query logging in development

pinecone:
  api_key: "${PINECONE_API_KEY}"
  index_name: "f2-therapy-index"
  dimension: 768  # Crucial: Must be 768 for Gemini
  metric: "cosine"
