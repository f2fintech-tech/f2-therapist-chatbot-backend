name: Complete Pipeline

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 1,8,15,22,29 * *'
  workflow_dispatch:

jobs:
  complete-pipeline:
    runs-on: ubuntu-latest
    env:
      # Secrets
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # Repository variables
      ENVIRONMENT: ${{ vars.ENVIRONMENT }}
      APP_ENV: ${{ vars.APP_ENV }}
      HOST: ${{ vars.HOST }}
      PORT: ${{ vars.PORT }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL }}
      ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
      CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_S3_BUCKET_NAME: ${{ vars.AWS_S3_BUCKET_NAME }}
      SQL_ECHO: ${{ vars.SQL_ECHO }}

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore dataset fingerprint
        uses: actions/cache@v4
        with:
          path: .ci-state/raw-data-fingerprint.txt
          key: raw-data-fingerprint-${{ github.ref_name }}
        
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Compute dataset fingerprint
        id: fingerprint
        run: |
          set -euo pipefail
          current_hash=$(python src/utils/dataset_fingerprint.py)
          cached_hash=""
          if [[ -f .ci-state/raw-data-fingerprint.txt ]]; then
            cached_hash="$(tr -d '\r\n' < .ci-state/raw-data-fingerprint.txt)"
          fi

          if [[ "$current_hash" == "$cached_hash" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Pipeline inputs unchanged; expensive steps will be skipped."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Pipeline inputs changed; running preprocessing, embedding, and training."
          fi

          echo "current_hash=$current_hash" >> "$GITHUB_OUTPUT"

      - name: Skip unchanged pipeline
        if: steps.fingerprint.outputs.changed == 'false'
        run: echo "No raw-data or pipeline-code changes detected. Skipping API-heavy steps."

      - name: Install dependencies
        if: steps.fingerprint.outputs.changed == 'true'
        run: pip install -r requirements.txt

      - name: Run pipeline
        if: steps.fingerprint.outputs.changed == 'true'
        run: python src/rag_pipeline.py --skip-s3-upload --skip-s3-download
# The S3 upload/download steps are skipped here to save time and API calls, but can be enabled for a full end-to-end run. 
# Run python src/rag_pipeline.py --skip-s3-upload to download existing model artifacts from S3 without uploading new ones, or omit both flags for a complete run that updates S3 with new artifacts.
#If dataset or training code changes are detected, the pipeline will run and update the local model artifacts. 
# You can then add a separate workflow to handle S3 sync and deployment on a less frequent schedule or via manual trigger.
      - name: Save dataset fingerprint
        if: steps.fingerprint.outputs.changed == 'true'
        run: |
          mkdir -p .ci-state
          printf '%s\n' "${{ steps.fingerprint.outputs.current_hash }}" > .ci-state/raw-data-fingerprint.txt