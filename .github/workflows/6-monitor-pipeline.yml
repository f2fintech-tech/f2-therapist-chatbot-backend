name: Monitor Pipeline

on:
  workflow_dispatch:
    inputs:
      alert_threshold:
        description: "Alert severity threshold (CRITICAL or WARNING)"
        required: false
        default: "WARNING"
        type: choice
        options:
          - CRITICAL
          - WARNING

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      # Secrets
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # Repository variables
      ENVIRONMENT: ${{ vars.ENVIRONMENT }}
      APP_ENV: ${{ vars.APP_ENV }}
      HOST: ${{ vars.HOST }}
      PORT: ${{ vars.PORT }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL }}
      ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
      CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_S3_BUCKET_NAME: ${{ vars.AWS_S3_BUCKET_NAME }}
      SQL_ECHO: ${{ vars.SQL_ECHO }}
      PYTHONPATH: src

    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run comprehensive health monitoring
        id: health_check
        run: |
          python src/monitoring/health_monitor.py \
            --output src/monitoring/health_check_results.json \
            --alert-threshold '${{ inputs.alert_threshold || 'WARNING' }}'
        continue-on-error: true

      - name: Parse monitoring results
        id: parse_results
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          results_file = Path("src/monitoring/health_check_results.json")
          if not results_file.exists():
              print("❌ Health check results not found")
              sys.exit(1)

          with open(results_file, "r") as f:
              results = json.load(f)

          overall_status = results.get("overall_status", "UNKNOWN")
          alerts = results.get("alerts", [])
          checks = results.get("checks", {})

          print(f"::set-output name=overall_status::{overall_status}")
          print(f"::set-output name=alert_count::{len(alerts)}")
          print(f"::set-output name=has_alerts::{'true' if alerts else 'false'}")

          # Summary output
          print("\n=== MONITORING SUMMARY ===")
          print(f"Status: {overall_status}")
          print(f"Alerts: {len(alerts)}")
          print(f"Checks Passed: {sum(1 for c in checks.values() if c.get('status') == 'OK')}/{len(checks)}")

          # Print check details
          if checks:
              print("\nCheck Details:")
              for name, check in checks.items():
                  status = check.get("status", "UNKNOWN")
                  message = check.get("message", "")
                  print(f"  • {name}: {status} - {message}")

          # Print all alerts
          if alerts:
              print("\nAlert Details:")
              for alert in alerts:
                  print(f"  [{alert['severity']}] {alert['service']}: {alert['message']}")
          PY

      - name: Run chatbot smoke test
        run: python src/model/model_test.py --query "I am stressed about debt" --no-rag --skip-training
        continue-on-error: true

      - name: Send Slack notification on alerting
        if: steps.parse_results.outputs.has_alerts == 'true'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "⚠️ Health Monitor Alert",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Health Monitoring Alert*\nStatus: ${{ steps.parse_results.outputs.overall_status }}\nAlerts: ${{ steps.parse_results.outputs.alert_count }}"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Details*\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true

      - name: Fail job on critical alerts
        if: steps.parse_results.outputs.overall_status == 'CRITICAL'
        run: |
          echo "❌ Critical alerts detected during health monitoring"
          exit 1
