version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: financial_therapist_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres} # Placeholder: Set your PostgreSQL username
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres} # Placeholder: Set your PostgreSQL password
      POSTGRES_DB: ${POSTGRES_DB:-financial_therapist} # Placeholder: Set your PostgreSQL database name
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - therapist_network
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial_therapist_backend
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development} # Placeholder: Set your environment (e.g., development, production)
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB} # Placeholder: Ensure these variables are set in .env
      GEMINI_API_KEY: ${GEMINI_API_KEY} # Placeholder: Add your GEMINI API key in .env
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000} # Placeholder: Set allowed origins
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-info} # Placeholder: Set log level
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - therapist_network
    restart: unless-stopped
    command: python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:

networks:
  therapist_network: