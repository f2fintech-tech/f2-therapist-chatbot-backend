services:
  # PostgreSQL Database (internal service; host exposure is localhost-only by default)
  db:
    image: postgres:16-alpine
    container_name: financial_therapist_db
    init: true
    environment:
      # Require explicit credentials at runtime to avoid weak/default secrets.
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-financial_therapist}
    ports:
      # Bind DB only to localhost unless you intentionally override DB_BIND_ADDRESS.
      - "${DB_BIND_ADDRESS:-127.0.0.1}:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # Basic hardening to reduce container privilege escalation surface.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - therapist_network
    restart: unless-stopped

  # FastAPI Backend API
  backend:
    build:
      context: .
      # Match repository filename exactly (Linux is case-sensitive).
      dockerfile: DockerFile
    container_name: financial_therapist_backend
    init: true
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-financial_therapist}
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      # Bind API to localhost by default; override BACKEND_BIND_ADDRESS for external access.
      - "${BACKEND_BIND_ADDRESS:-127.0.0.1}:${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Source mounted read-only to reduce tampering risk from inside the container.
      - .:/app:ro
    networks:
      - therapist_network
    restart: unless-stopped
    # Prevent gaining extra privileges and drop Linux capabilities not needed by FastAPI.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Keep root filesystem read-only; /tmp remains writable via tmpfs.
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:

networks:
  therapist_network:
